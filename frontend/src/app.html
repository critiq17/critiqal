<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<link rel="icon" type="image/png" href="/assets/critiqal-favicon.png" />
		<!-- Official Telegram Mini App SDK. MUST be the first script and load
		     synchronously, before the init code below: methods like
		     disableVerticalSwipes() and the BackButton/MainButton click events
		     live in this file, not in the client's auto-injected object.
		     Without it the swipe lock and native buttons silently do nothing. -->
		<script src="https://telegram.org/js/telegram-web-app.js?62"></script>
		<script>
			// Initialize Telegram Mini App before first paint to prevent flash of unstyled content.
			if (window.Telegram?.WebApp) {
				var tg = window.Telegram.WebApp;

				// ready() must be called first — enables subsequent method calls to take effect.
				tg.ready();
				tg.expand();

				// setHeaderColor must use the same color as the app background (--tg-bg).
				// Using tg.backgroundColor ensures the header blends seamlessly with app content.
				tg.setHeaderColor(tg.backgroundColor || '#0f0f0f');

				// Disable swipe-down-to-minimize/close. With the SDK loaded this
				// now actually reaches the client. Re-asserted on every gesture
				// and viewport change from telegram.ts.
				try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch(e) {}

				// Last-resort safety net: if a swipe ever still reaches the
				// client, Telegram shows a native "Close?" confirm instead of
				// closing outright. Never fires during scrolling.
				try { tg.enableClosingConfirmation && tg.enableClosingConfirmation(); } catch(e) {}

				// requestFullscreen (Bot API 8.0+) hides the native Telegram header and extends
				// the app to the full device screen. When opened via inline keyboard or Menu Button,
				// Telegram animates a "sheet" upward — calling requestFullscreen during this animation
				// is silently ignored. We retry with increasing delays to cover all entry points.
				function tryFullscreen() {
					if (tg.isFullscreen) return;
					try { tg.requestFullscreen && tg.requestFullscreen(); } catch(e) {}
				}

				tryFullscreen();
				setTimeout(tryFullscreen, 200);
				setTimeout(tryFullscreen, 600);

				// If fullscreen is not supported on the device, fall back to expand().
				tg.onEvent('fullscreenFailed', function() {
					tg.expand();
				});

				function applyViewport() {
					var h = tg.viewportHeight || window.innerHeight;
					document.documentElement.style.setProperty('--tg-viewport-height', h + 'px');

					// contentSafeAreaInset = space taken by transparent Telegram UI (header/footer)
					// in fullscreen mode. Also set by Telegram SDK as --tg-content-safe-area-inset-*.
					// Only set when > 0: setting 0px explicitly would block the CSS fallback chain
					// that relies on --tg-content-safe-area-inset-top (auto-set by TG SDK).
					var ci = tg.contentSafeAreaInset;
					if (ci && ci.top > 0) {
						document.documentElement.style.setProperty('--tg-content-top', ci.top + 'px');
					}
					if (ci && ci.bottom > 0) {
						document.documentElement.style.setProperty('--tg-content-bottom', ci.bottom + 'px');
					}
				}

				// After viewport stabilizes (animation done), retry fullscreen if still not active.
				tg.onEvent('viewportChanged', function(params) {
					applyViewport();
					if (params && !params.isStateStable) return;
					tryFullscreen();
				});
				tg.onEvent('fullscreenChanged', applyViewport);
				// safeAreaChanged fires when safe area insets update (can lag behind fullscreenChanged)
				tg.onEvent('safeAreaChanged', applyViewport);
				tg.onEvent('contentSafeAreaChanged', applyViewport);
				tg.onEvent('themeChanged', function() {
					tg.setHeaderColor(tg.backgroundColor || '#0f0f0f');
				});
				applyViewport();
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
