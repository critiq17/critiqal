# Deploy to dev
name: Deploy to dev

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: ./mvnw package -DskipTests -q

      - name: Build Docker image
        working-directory: backend
        run: docker build -t critiqal-backend-dev:latest .

      - name: Save image
        run: docker save critiqal-backend-dev:latest | gzip > backend-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar.gz
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/build/
            frontend/package.json
            frontend/package-lock.json
          retention-days: 1

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build/

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authKey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Copy Docker image
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "backend-image.tar.gz"
          target: "/opt/critiqal/dev/"
          overwrite: true

      - name: Copy docker-compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "backend/docker-compose.dev.yml"
          target: "/opt/critiqal/dev/backend/"
          strip_components: 1
          overwrite: true

      - name: Copy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "frontend-build/"
          target: "/opt/critiqal/dev/frontend/"
          strip_components: 1
          overwrite: true
          rm: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 10m
          script: |
            echo "Deploying dev"
            cd /opt/critiqal/dev

            docker load < backend-image.tar.gz
            rm backend-image.tar.gz

            cd /opt/critiqal/dev/backend
            echo "Starting containers..."
            docker compose -f docker-compose.dev.yml up -d --force-recreate

            echo "Waiting for backend" 
            for i in $(seq 1 30);do
              curl -sf http://localhost:8083/health > /dev/null 2>&1 && echo "Backend ready" && break
              [ "$i" -eq 30 ] && docker compose -f docker-compose.dev.yml logs --tail=30 backend && exit 1
              sleep 2
            done

            cd /opt/critiqal/dev/frontend
            npm ci --omit=dev --silent
            PORT=3001 pm2 reload critiqal-dev --update-env 2>/dev/null || \
              PORT=3001 pm2 start index.js --name critiqal-dev
            pm2 save

            echo "Dev deploy complete"
