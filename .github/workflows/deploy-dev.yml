# Deploy to dev

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        working-directory: backend
        run: ./mvnw package -DskipTests -q

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: |
          npm ci
          npm run build

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authKey: ${{ secrets.TAILSCALE_AUTHKEY }}
      
      - name: Copy backend to server
        uses: appleboy/scp-action@v0.1.7
        with: 
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "backend/target/quakus-app/,backend/docker-compose.dev.yml,backend/Dockerfile"
          target: "/opt/critiqal/dev/backend/"
          strip_components: 1
          overwrite: true

      - name: Copy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with: 
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "frontend/build/"
          target: "/opt/critiqal/dev/frontend/"
          strip_components: 1
          overwrite: true

      - name: Deploy on server
        uses: applebot/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 10m
          script: |
            echo "Deploying dev"

            cd /opt/critiqal/dev/backend

            echo "Building Docker image..."
            docker build -t critiqal-backend-dev:latest .

            echo "Starting containers..."
            docker compose -f docker-compose.dev.yml up -d --force-recreate

            echo "Waiting for backend"
            for i in $(seq 1 60);do
              if curl -sf http://locahost:8083/q/health/ready > /dev/null 2>&1; then
                echo "Dev backend is ready"
                break
              fi
              if [ $i -eq 60]; then
                echo "Dev backend failed to start"
                docker compose -f docker-compose.dev.yml logs --tail=50 backend
                exit 1
              fi
              sleep 2
            done

            cd /opt/critiqal/dev/frontend

            if [ -f "build/package.json" ]; then
              cd build && npm ci --omit=dev 2>/dev/null && cd ..
            fi

            echo "Restarting frontend..."
            PORT=3001 pm2 reload critiqal-dev 2>/dev/null | \
              PORT=3001 pm2 start build/index.js --name critiqal-dev
            pm2 save

            echo "Dev deploy complete"