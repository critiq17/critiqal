# Deploy to dev
#
# Strategy:
#   1. detect-changes: find which directories changed (backend / frontend / admin-frontend).
#   2. Build only what changed — backend Docker image, main frontend, or admin frontend.
#   3. deploy: conditional steps per component; only what was built gets deployed.
#
# Why skip unchanged components:
#   - Backend image rebuild takes ~8 min; skipping it on pure frontend changes saves a full pipeline.
#   - dorny/paths-filter compares the push range (before..after) so the check is cheap and accurate.
name: Deploy to dev

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/critiqal-backend
  IMAGE_TAG: dev

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            admin:
              - 'admin-frontend/**'

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/build/
            frontend/package.json
            frontend/package-lock.json
          retention-days: 1

  build-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: admin-frontend/pnpm-lock.yaml

      - name: Build
        working-directory: admin-frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          # Generate package-lock.json so the server can use `npm ci --omit=dev`
          npm install --package-lock-only --omit=dev

      - uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: |
            admin-frontend/build/
            admin-frontend/package.json
            admin-frontend/package-lock.json
          retention-days: 1

  deploy:
    needs: [detect-changes, build-backend, build-frontend, build-admin]
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.build-admin.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authKey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # ─── Backend ─────────────────────────────────────────────────────────────
      - name: Copy docker-compose (backend)
        if: needs.detect-changes.outputs.backend == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "backend/docker-compose.dev.yml"
          target: "/opt/critiqal/dev/backend/"
          strip_components: 1
          overwrite: true

      - name: Deploy backend on server
        if: needs.detect-changes.outputs.backend == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GHCR_TOKEN,GHCR_USER,BACKEND_IMAGE
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/critiqal/dev/backend
            export BACKEND_IMAGE
            docker compose -f docker-compose.dev.yml pull backend
            docker compose -f docker-compose.dev.yml up -d --remove-orphans
            docker logout ghcr.io >/dev/null 2>&1 || true
            for i in $(seq 1 30); do
              curl -sf http://localhost:8083/health >/dev/null 2>&1 && echo "Backend ready" && break
              [ "$i" -eq 30 ] && docker compose -f docker-compose.dev.yml logs --tail=30 backend && exit 1
              sleep 2
            done
            docker image prune -f >/dev/null 2>&1 || true

      # ─── Main Frontend ────────────────────────────────────────────────────────
      - name: Download frontend artifact
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build/

      - name: Copy frontend build
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "frontend-build/"
          target: "/opt/critiqal/dev/frontend/"
          strip_components: 1
          overwrite: true
          rm: true

      - name: Deploy frontend on server
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/critiqal/dev/frontend
            npm ci --omit=dev --ignore-scripts --prefer-offline --no-audit --fund=false --silent
            pm2 delete critiqal-dev 2>/dev/null || true
            PORT=3001 pm2 start build/index.js --name critiqal-dev --update-env
            pm2 save

      # ─── Admin Frontend ───────────────────────────────────────────────────────
      - name: Download admin artifact
        if: needs.detect-changes.outputs.admin == 'true'
        uses: actions/download-artifact@v4
        with:
          name: admin-build
          path: admin-build/

      - name: Copy admin build
        if: needs.detect-changes.outputs.admin == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "admin-build/"
          target: "/opt/critiqal/dev/admin-frontend/"
          strip_components: 1
          overwrite: true
          rm: true

      - name: Deploy admin on server
        if: needs.detect-changes.outputs.admin == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/critiqal/dev/admin-frontend
            npm ci --omit=dev --ignore-scripts --prefer-offline --no-audit --fund=false --silent
            pm2 delete critiqal-admin-dev 2>/dev/null || true
            PORT=3003 pm2 start build/index.js --name critiqal-admin-dev --update-env
            pm2 save

      - name: Dev deploy complete
        run: echo "Done — $(date -u)"
