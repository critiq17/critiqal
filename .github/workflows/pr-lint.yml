name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [dev]

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            chore
            ci
            test
            build
          requireScope: false
          subjectPattern: ^.{1,100}$
          subjectPatternError: |
            PR title subject must be 1-100 characters.