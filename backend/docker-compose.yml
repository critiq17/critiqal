services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5444:5432"

  redis:
    image: redis:7-alpine
    container_name: critiqal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"