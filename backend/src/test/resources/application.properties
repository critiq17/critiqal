
# ORM
quarkus.datasource.devservices.enabled=true
quarkus.flyway.migrate-at-start=true

# Http Server config
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

# JWT config
mp.jwt.verify.issuer=http://localhost:5173
mp.jwt.verify.publickey.location=test-publicKey.pem
smallrye.jwt.sign.key.location=test-privateKey.pem

# INFRASTRUCTURE (S3, PostgreSQL)

# Postgres config
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}

# S3 config
r2.account-id=test
r2.access-key=test
r2.secret-key=test
r2.bucket=test
r2.public-url=http://localhost
quarkus.s3.aws.region=auto

# INTEGRATIONS config (Strava)
strava.client-id=test
strava.client-secret=test
strava.redirect-uri=http://localhost/callback