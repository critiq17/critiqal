mp.jwt.verify.issuer=http://localhost:5173
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=critiq
quarkus.datasource.password=1234
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5444/critiqal
quarkus.hibernate-orm.database.generation=drop-and-create


quarkus.flyway.migrate-at-start=true

quarkus.http.port=8082
quarkus.log.level=INFO
quarkus.log.category."io.quarkus".level=INFO

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

r2.account-id=${R2_ACCOUNT_ID}
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
r2.bucket=${R2_BUCKET}
r2.public-url=${R2_PUBLIC_URL}
