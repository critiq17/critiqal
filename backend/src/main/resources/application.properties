# ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.id.optimizer.pooled.prefer-legacy-behavior=true

# HTTP
quarkus.http.port=${BACKEND_PORT:8082}
quarkus.log.level=INFO
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

%dev.quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
%prod.quarkus.redis.hosts=${REDIS_URL}
quarkus.redis.timeout=PT2S
%test.quarkus.redis.devservices.enabled=true

session.cookie.name=session
session.ttl-days=30
session.cookie.secure=${SESSION_COOKIE_SECURE:false}
session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
%prod.session.cookie.secure=true
%prod.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:None}

# PostgreSQL
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=${DB_USER}
%dev.quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

%prod.telegram.bot-token=${TELEGRAM_BOT_TOKEN}
%prod.telegram.chat-id=${TELEGRAM_BOT_CHAT_ID}
%prod.telegram.enabled=${TELEGRAM_ENABLED}

%dev.telegram.bot-token=${LOCAL_TELEGRAM_BOT_TOKEN}
%dev.telegram.chat-id=${LOCAL_TELEGRAM_CHAT_ID}
%dev.telegram.enabled=${LOCAL_TELEGRAM_ENABLED}

%test.telegram.enabled=true


# S3
%dev.r2.account-id=${R2_ACCOUNT_ID}
%dev.r2.access-key=${R2_ACCESS_KEY}
%dev.r2.secret-key=${R2_SECRET_KEY}
%dev.r2.bucket=${R2_BUCKET}
%dev.r2.public-url=${R2_PUBLIC_URL}
%prod.r2.account-id=${R2_ACCOUNT_ID}
%prod.r2.access-key=${R2_ACCESS_KEY}
%prod.r2.secret-key=${R2_SECRET_KEY}
%prod.r2.bucket=${R2_BUCKET}
%prod.r2.public-url=${R2_PUBLIC_URL}

# Strava
%dev.strava.client-id=${STRAVA_CLIENT_ID}
%dev.strava.client-secret=${STRAVA_CLIENT_SECRET}
%dev.strava.redirect-uri=${STRAVA_REDIRECT_URI}
%prod.strava.client-id=${STRAVA_CLIENT_ID}
%prod.strava.client-secret=${STRAVA_CLIENT_SECRET}
%prod.strava.redirect-uri=${STRAVA_REDIRECT_URI}
