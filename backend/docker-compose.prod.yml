services:
  db:
    image: postgres:16-alpine
    container_name: critiqal-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/critiq17/critiqal-backend:prod}
    container_name: critiqal-prod-backend
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
    volumes:
      - ../keys/privateKey.pem:/app/privateKey.pem:ro
      - ../keys/publicKey.pem:/app/publicKey.pem:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_prod: